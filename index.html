<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>aSSIST 인맥왕 지도</title>
    <style>
        :root {
            --primary: #0052cc;
            --primary-light: #e6efff;
            --text-main: #172b4d;
            --text-muted: #5e6c84;
            --bg-color: #f4f5f7;
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        body { background-color: var(--bg-color); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        header {
            position: absolute; top: 0; width: 100%; z-index: 10;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
            padding: 16px 16px 30px 16px;
            pointer-events: none;
        }
        .search-box {
            background: #fff; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); pointer-events: auto;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .search-box input { border: none; outline: none; flex: 1; font-size: 16px; font-weight: 500; color: var(--text-main); }
        .search-box input::placeholder { color: #a5adba; }
        
        #map { flex: 1; width: 100%; height: 100%; z-index: 1; }

        /* List View Button */
        .list-btn {
            position: absolute; bottom: 30px; right: 20px; z-index: 10;
            background: var(--primary); color: white; border: none;
            border-radius: 50%; width: 56px; height: 56px;
            box-shadow: 0 4px 15px rgba(0,82,204,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s;
        }
        .list-btn:active { transform: scale(0.95); }
        .list-btn svg { width: 26px; height: 26px; stroke: white; }

        /* GPS Button */
        .gps-btn {
            position: absolute; bottom: 100px; right: 20px; z-index: 10;
            background: white; color: var(--primary); border: none;
            border-radius: 50%; width: 50px; height: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s;
        }
        .gps-btn:active { transform: scale(0.95); }
        .gps-btn svg { width: 22px; height: 22px; stroke: var(--text-main); fill: none; }

        /* List View Modal */
        .list-modal {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%; z-index: 30;
            background: white; transition: top 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
        }
        .list-modal.active { top: 0; }
        .list-header {
            padding: 20px; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-header h2 { font-size: 20px; color: var(--text-main); font-weight: 700; }
        .close-btn { background: none; border: none; padding: 5px; cursor: pointer; }
        .contact-list {
            flex: 1; overflow-y: auto; padding: 0 20px 20px 20px;
        }
        .list-item {
            padding: 16px 0; border-bottom: 1px solid #f4f5f7; cursor: pointer;
        }
        .list-item:active { background: #f9fafb; }
        .list-item-name { font-size: 16px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .list-item-company { font-size: 14px; color: var(--text-muted); }

        /* Bottom Sheet */
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; z-index: 20;
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 24px 24px 0 0; box-shadow: 0 -4px 25px rgba(0,0,0,0.1);
            padding: 24px; transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 80vh; overflow-y: auto;
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-handle {
            width: 40px; height: 5px; background: #dfe1e6; border-radius: 3px;
            margin: 0 auto 20px auto;
        }
        .contact-info h2 { font-size: 22px; color: var(--text-main); margin-bottom: 4px; }
        .contact-info .company { color: var(--primary); font-size: 15px; font-weight: 600; margin-bottom: 16px; }
        .info-row { display: flex; margin-bottom: 12px; align-items: flex-start; }
        .info-label { width: 60px; color: var(--text-muted); font-size: 13px; font-weight: 500; margin-top: 2px; }
        .info-value { flex: 1; color: var(--text-main); font-size: 15px; word-break: keep-all; }
        .action-btns { display: flex; gap: 10px; margin-top: 24px; }
        .action-btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer;
            text-align: center; text-decoration: none; display: inline-block;
        }
        .btn-call { background: var(--primary-light); color: var(--primary); }
        .btn-nav { background: var(--primary); color: #fff; }

        /* Marker Name Overlay */
        .custom-overlay {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            border: 1px solid var(--primary-light);
            color: var(--text-main);
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.15);
            transform: translateY(22px);
            white-space: nowrap;
            pointer-events: none; /* Let clicks pass through to map or marker */
        }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--primary-light); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-text { color: var(--text-main); font-weight: 600; }
    </style>
</head>

    <div id="map"></div>

            </button>
        </div>

        </div>
    </div>

    <!-- Bottom Sheet Details -->
    <div class="bottom-sheet" id="bottomSheet">

            </div>
        </div>
    </div>

@lgresearch.ai", "address": "서울특별시 강서구 마곡중앙로 150"}, {"name": "최윤정", "company": "영원아웃도어", "department": "디지털 부문", "title": "상무 / ISO23001, ISO27001 인증심사원 / CISO", "phone": "010-2261-7555", "email": "yjchoi@youngone.co.kr", "address": "경기도 성남시 중원구 광명로 293"}, {"name": "이종섭", "company": "코오롱인더스트리", "department": "C&J 마케팅 Part / C&J 사업부", "title": "차장", "phone": "010-9622-8020", "email": "brant@kolon.com", "address": "서울특별시 강남구 삼성로 518"}];
        let map;
        let geocoder;
        let markers = [];
        let completedGeocodes = 0;
        let myLocationMarker = null;

        function updateProgress(processed, total) {
            document.getElementById('progressText').innerText = `명단 불러오는 중... (${processed}/${total})`;
            if (processed >= total) {
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 500);
                }, 500);
            }
        }

        function initApp() {
            const appKey = '856c019ecce1b1bf04447f7c38bb623c';
            const script = document.createElement('script');
            script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${appKey}&libraries=services&autoload=false`;
            script.onerror = () => { alert('카카오맵 로드 실패! 사이트 도메인이 올바르게 등록되었는지 확인하세요.'); };
            document.head.appendChild(script);

            script.onload = () => {
                kakao.maps.load(() => { initMap(); });
            };
        }

        function initMap() {
            const container = document.getElementById('map');
            const options = { center: new kakao.maps.LatLng(37.566826, 126.978656), level: 9 };
            map = new kakao.maps.Map(container, options);
            geocoder = new kakao.maps.services.Geocoder();

            geocodeContacts();
        }

        function geocodeContacts() {
            const total = contactsData.length;
            const validContacts = [];
            
            contactsData.forEach((contact, index) => {
                if(!contact.address || contact.address.trim() === '') {
                    completedGeocodes++;
                    updateProgress(completedGeocodes, total);
                    return;
                }

                setTimeout(() => {
                    geocoder.addressSearch(contact.address, function(result, status) {
                        completedGeocodes++;
                        if (status === kakao.maps.services.Status.OK) {
                            contact.lat = result[0].y;
                            contact.lng = result[0].x;
                            validContacts.push(contact);
                            createMarker(contact);
                        }
                        updateProgress(completedGeocodes, total);
                        
                        if(completedGeocodes === total && validContacts.length > 0) {
                            const bounds = new kakao.maps.LatLngBounds();
                            validContacts.forEach(c => bounds.extend(new kakao.maps.LatLng(c.lat, c.lng)));
                            map.setBounds(bounds);
                            renderList(); // Render list once all are loaded
                        }
                    });
                }, index * 100);
            });
        }

        function createMarker(contact) {
            const pos = new kakao.maps.LatLng(contact.lat, contact.lng);
            const marker = new kakao.maps.Marker({ position: pos, map: map });
            marker.contactData = contact;
            
            // Name Overlay
            const overlayContent = `<div class="custom-overlay">${contact.name}</div>`;
            const customOverlay = new kakao.maps.CustomOverlay({
                position: pos,
                content: overlayContent,
                map: map,
                yAnchor: 0
            });
            marker.customOverlay = customOverlay;
            
            markers.push(marker);

            kakao.maps.event.addListener(marker, 'click', function() {
                openBottomSheet(contact);
                map.panTo(pos);
            });
        }

        // Render List Modal
        function renderList() {
            const listContainer = document.getElementById('contactList');
            // Filter visible markers
            const visibleMarkers = markers.filter(m => m.getMap() !== null);
            document.getElementById('listCount').innerText = visibleMarkers.length;
            listContainer.innerHTML = '';
            
            // Sort by name
            const sorted = [...visibleMarkers].sort((a, b) => a.contactData.name.localeCompare(b.contactData.name));
            
            sorted.forEach(m => {
                const d = m.contactData;
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div class="list-item-name">${d.name} <span style="font-size:13px; font-weight:normal; color:var(--text-muted);">${d.title || ''}</span></div>
                    <div class="list-item-company">${d.company} ${d.department ? '- ' + d.department : ''}</div>
                `;
                div.onclick = () => {
                    document.getElementById('listModal').classList.remove('active');
                    setTimeout(() => {
                        map.panTo(m.getPosition());
                        openBottomSheet(d);
                    }, 350);
                };
                listContainer.appendChild(div);
            });
        }

        // GPS Location Logic
        document.getElementById('gpsBtn').onclick = () => {
            if (navigator.geolocation) {
                const btn = document.getElementById('gpsBtn');
                btn.style.opacity = '0.5';
                
                // Show temporary toast or feedback if desired
                
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const locPosition = new kakao.maps.LatLng(lat, lon);
                    
                    if (myLocationMarker) {
                        myLocationMarker.setMap(null);
                    }
                    
                    // Star Marker for My Location
                    const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png'; 
                    const imageSize = new kakao.maps.Size(24, 35); 
                    const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize); 
                    
                    myLocationMarker = new kakao.maps.Marker({  
                        map: map, 
                        position: locPosition,
                        image: markerImage
                    });
                    
                    map.panTo(locPosition);
                    map.setLevel(4); // Zoom in closer to my location
                    btn.style.opacity = '1';
                }, function(error) {
                    alert('위치 정보를 가져올 수 없거나 권한이 차단되었습니다.\n(스마트폰의 위치 설정 및 브라우저 권한을 확인해주세요)');
                    btn.style.opacity = '1';
                }, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                });
            } else {
                alert('사용 중인 브라우저에서 현재 위치 기능을 지원하지 않습니다.');
            }
        };

        // List View Interactions
        document.getElementById('listBtn').onclick = () => {
            renderList();
            document.getElementById('listModal').classList.add('active');
        };
        document.getElementById('closeListBtn').onclick = () => {
            document.getElementById('listModal').classList.remove('active');
        };

        // Bottom Sheet Logic
        const bottomSheet = document.getElementById('bottomSheet');
        function openBottomSheet(contact) {
            document.getElementById('bsName').innerText = contact.name;
            document.getElementById('bsCompany').innerText = contact.company + (contact.department ? ` | ${contact.department}` : '');
            document.getElementById('bsTitle').innerText = contact.title || '-';
            document.getElementById('bsPhone').innerText = contact.phone || '-';
            document.getElementById('bsEmail').innerText = contact.email || '-';
            document.getElementById('bsAddress').innerText = contact.address || '-';
            
            document.getElementById('bsBtnCall').href = `tel:${contact.phone}`;
            document.getElementById('bsBtnNav').href = `https://map.kakao.com/link/to/${contact.company},${contact.lat},${contact.lng}`;

            bottomSheet.classList.add('active');
        }

        document.getElementById('map').addEventListener('click', () => bottomSheet.classList.remove('active'));
        document.querySelector('.sheet-handle').addEventListener('click', () => bottomSheet.classList.remove('active'));

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            let hasVisible = false;
            const bounds = new kakao.maps.LatLngBounds();

            markers.forEach(m => {
                const d = m.contactData;
                const match = d.name.toLowerCase().includes(query) || d.company.toLowerCase().includes(query);
                m.setMap(match ? map : null);
                if (m.customOverlay) m.customOverlay.setMap(match ? map : null);
                if (match) {
                    bounds.extend(m.getPosition());
                    hasVisible = true;
                }
            });
            
            if(document.getElementById('listModal').classList.contains('active')) {
                renderList(); // Update list while searching if open
            }
        });

        window.onload = initApp;
    </script>
