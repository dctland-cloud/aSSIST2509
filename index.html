<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인맥왕 명함 지도 (aSSIST 박사 동기)</title>
    <style>
        :root {
            --primary: #0052cc;
            --primary-light: #e6efff;
            --text-main: #172b4d;
            --text-muted: #5e6c84;
            --bg-color: #f4f5f7;
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        body { background-color: var(--bg-color); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header & Search */
        header {
            position: absolute; top: 0; width: 100%; z-index: 10;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
            padding: 16px 16px 30px 16px;
            pointer-events: none; /* Let clicks pass through except on children */
        }
        .search-box {
            background: #fff; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); pointer-events: auto;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .search-box input { border: none; outline: none; flex: 1; font-size: 16px; font-weight: 500; color: var(--text-main); }
        .search-box input::placeholder { color: #a5adba; }
        
        /* Map Container */
        #map { flex: 1; width: 100%; height: 100%; z-index: 1; }

        /* Bottom Sheet */
        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; z-index: 20;
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 24px 24px 0 0; box-shadow: 0 -4px 25px rgba(0,0,0,0.1);
            padding: 24px; transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 80vh; overflow-y: auto;
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-handle {
            width: 40px; height: 5px; background: #dfe1e6; border-radius: 3px;
            margin: 0 auto 20px auto;
        }
        .contact-info h2 { font-size: 22px; color: var(--text-main); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
        .contact-info .company { color: var(--primary); font-size: 15px; font-weight: 600; margin-bottom: 16px; }
        .info-row { display: flex; margin-bottom: 12px; align-items: flex-start; }
        .info-label { width: 60px; color: var(--text-muted); font-size: 13px; font-weight: 500; margin-top: 2px; }
        .info-value { flex: 1; color: var(--text-main); font-size: 15px; word-break: keep-all; }
        .action-btns { display: flex; gap: 10px; margin-top: 24px; }
        .action-btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer;
            text-align: center; text-decoration: none; display: inline-block;
        }
        .btn-call { background: var(--primary-light); color: var(--primary); }
        .btn-nav { background: var(--primary); color: #fff; }

        /* Loading Overlay */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999;
            background: rgba(255,255,255,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--primary-light); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .progress-text { color: var(--text-main); font-weight: 600; }
        .progress-sub { color: var(--text-muted); font-size: 13px; margin-top: 8px; }
    </style>
</head>

        let map;
        let geocoder;
        let markers = [];
        let completedGeocodes = 0;

        function updateProgress(processed, total) {
            document.getElementById('progressText').innerText = `주소 변환 중... (${processed}/${total})`;
            if (processed >= total) {
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    loading.style.opacity = '0';
                    setTimeout(() => loading.style.display = 'none', 500);
                }, 500);
            }
        }

        function initApp() {
            const appKey = '856c019ecce1b1bf04447f7c38bb623c';

            const script = document.createElement('script');
            script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${appKey}&libraries=services&autoload=false`;
            script.onerror = () => {
                alert('카카오맵 로드 실패! API 키가 정확한지, 사이트 도메인이 등록되어 있는지 확인하세요.');
                localStorage.removeItem('kakao_app_key');
                location.reload();
            };
            document.head.appendChild(script);

            script.onload = () => {
                kakao.maps.load(() => {
                    initMap();
                });
            };
        }

        function initMap() {
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(37.566826, 126.978656), // Seoul Default
                level: 9
            };
            map = new kakao.maps.Map(container, options);
            geocoder = new kakao.maps.services.Geocoder();

            geocodeContacts();
        }

        function geocodeContacts() {
            const total = contactsData.length;
            const validContacts = [];
            
            // Stagger geocoding requests to prevent rate limiting
            contactsData.forEach((contact, index) => {
                if(!contact.address || contact.address.trim() === '') {
                    completedGeocodes++;
                    updateProgress(completedGeocodes, total);
                    return;
                }

                setTimeout(() => {
                    geocoder.addressSearch(contact.address, function(result, status) {
                        completedGeocodes++;
                        if (status === kakao.maps.services.Status.OK) {
                            const lat = result[0].y;
                            const lng = result[0].x;
                            contact.lat = lat;
                            contact.lng = lng;
                            validContacts.push(contact);
                            createMarker(contact);
                        }
                        updateProgress(completedGeocodes, total);
                        
                        // If all done, center map to fit all markers
                        if(completedGeocodes === total && validContacts.length > 0) {
                            const bounds = new kakao.maps.LatLngBounds();
                            validContacts.forEach(c => bounds.extend(new kakao.maps.LatLng(c.lat, c.lng)));
                            map.setBounds(bounds);
                        }
                    });
                }, index * 100); // 100ms interval
            });
        }

        function createMarker(contact) {
            const markerPosition = new kakao.maps.LatLng(contact.lat, contact.lng);
            const marker = new kakao.maps.Marker({
                position: markerPosition,
                map: map
            });
            
            marker.contactData = contact;
            markers.push(marker);

            kakao.maps.event.addListener(marker, 'click', function() {
                openBottomSheet(contact);
                map.panTo(markerPosition);
            });
        }

        // Bottom Sheet Logic
        const bottomSheet = document.getElementById('bottomSheet');
        function openBottomSheet(contact) {
            document.getElementById('bsName').innerText = contact.name;
            document.getElementById('bsCompany').innerText = contact.company + (contact.department ? ` | ${contact.department}` : '');
            document.getElementById('bsTitle').innerText = contact.title || '-';
            document.getElementById('bsPhone').innerText = contact.phone || '-';
            document.getElementById('bsEmail').innerText = contact.email || '-';
            document.getElementById('bsAddress').innerText = contact.address || '-';
            
            document.getElementById('bsBtnCall').href = `tel:${contact.phone}`;
            document.getElementById('bsBtnNav').href = `https://map.kakao.com/link/to/${contact.company},${contact.lat},${contact.lng}`;

            bottomSheet.classList.add('active');
        }

        // Close bottom sheet when clicking outside (on the map)
        document.getElementById('map').addEventListener('click', () => {
            bottomSheet.classList.remove('active');
        });
        // Also close when dragging handle down
        document.querySelector('.sheet-handle').addEventListener('click', () => {
            bottomSheet.classList.remove('active');
        });

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            let hasVisible = false;
            const bounds = new kakao.maps.LatLngBounds();

            markers.forEach(m => {
                const d = m.contactData;
                const match = d.name.toLowerCase().includes(query) || d.company.toLowerCase().includes(query);
                m.setMap(match ? map : null);
                if (match) {
                    bounds.extend(m.getPosition());
                    hasVisible = true;
                }
            });

            if (query && hasVisible) {
                // Optionally bounds map if there's a search term
                // map.setBounds(bounds);
            }
        });

        // Start
        window.onload = initApp;
    </script>
