<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3b2417">
  <title>오늘 누구랑 커피?</title>

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dctland-cloud.github.io/aSSIST2509/coffee/">
  <meta property="og:title" content="☕ 오늘 누구랑 커피?">
  <meta property="og:description" content="버튼 한 번으로 오늘 연락할 aSSIST 동기를 뽑아보세요!">
  <meta property="og:image" content="https://dctland-cloud.github.io/aSSIST2509/og-assist-map.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Jua&display=swap" rel="stylesheet">
  <style>
    :root {
      --coffee: #3b2417;
      --coffee-2: #6d442c;
      --cream: #fff8ec;
      --foam: #fffdf8;
      --orange: #ff8a3d;
      --orange-2: #ffb36b;
      --mint: #69d4c7;
      --ink: #2d211b;
      --muted: #78685f;
      --shadow: 0 24px 70px rgba(41, 22, 10, .24);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Gowun Dodum", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255,179,107,.42), transparent 25rem),
        radial-gradient(circle at 90% 88%, rgba(105,212,199,.25), transparent 27rem),
        linear-gradient(145deg, #422719 0%, #70452d 55%, #3b2417 100%);
      overflow-x: hidden;
    }
    body::before, body::after {
      content: "";
      position: fixed;
      width: 220px;
      height: 220px;
      border: 2px solid rgba(255,255,255,.08);
      border-radius: 50%;
      pointer-events: none;
    }
    body::before { left: -90px; bottom: -100px; }
    body::after { right: -120px; top: 80px; width: 300px; height: 300px; }
    button, select, input { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    .app {
      width: min(100%, 560px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(24px, env(safe-area-inset-top)) 18px max(34px, env(safe-area-inset-bottom));
      position: relative;
      z-index: 1;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: rgba(255,255,255,.78);
      font-size: 13px;
      letter-spacing: .08em;
      margin-bottom: 14px;
    }
    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 11px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 99px;
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
    }
    .hero { color: white; padding: 8px 4px 24px; }
    .eyebrow { margin: 0 0 4px; color: #ffd7b5; font-size: 14px; }
    h1 {
      margin: 0;
      font-family: "Jua", sans-serif;
      font-size: clamp(36px, 9vw, 52px);
      line-height: 1.05;
      font-weight: 400;
      letter-spacing: -.035em;
      text-shadow: 0 5px 18px rgba(0,0,0,.16);
    }
    .hero p:last-child { margin: 10px 0 0; color: rgba(255,255,255,.76); line-height: 1.6; font-size: 14px; }
    .panel {
      background: rgba(255,248,236,.97);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .controls {
      padding: 18px 18px 15px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      border-bottom: 1px solid rgba(59,36,23,.08);
    }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 12px; color: var(--muted); padding-left: 3px; }
    select {
      width: 100%;
      border: 1px solid #e6d9c8;
      border-radius: 14px;
      padding: 11px 34px 11px 12px;
      color: var(--ink);
      background: var(--foam);
      outline: none;
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #7d695e 50%), linear-gradient(135deg, #7d695e 50%, transparent 50%);
      background-position: calc(100% - 17px) 52%, calc(100% - 12px) 52%;
      background-size: 5px 5px;
      background-repeat: no-repeat;
    }
    select:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(255,138,61,.15); }
    .toggle-row {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 4px 0;
      color: #604d42;
      font-size: 13px;
    }
    .switch { position: relative; width: 46px; height: 26px; flex: 0 0 auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; border-radius: 99px; background: #d8c9b8; transition: .2s; cursor: pointer; }
    .slider::before { content: ""; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; border-radius: 50%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,.18); transition: .2s; }
    .switch input:checked + .slider { background: var(--mint); }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .stage { padding: 22px 18px 18px; text-align: center; position: relative; }
    .cup {
      width: 72px;
      height: 56px;
      margin: 0 auto 12px;
      border-radius: 8px 8px 26px 26px;
      background: linear-gradient(135deg, #fff, #f5dfc8);
      box-shadow: inset 0 -8px 14px rgba(109,68,44,.12), 0 10px 16px rgba(84,48,25,.12);
      position: relative;
    }
    .cup::before { content: ""; position: absolute; width: 24px; height: 28px; border: 7px solid #f5dfc8; border-left: 0; border-radius: 0 18px 18px 0; right: -22px; top: 8px; }
    .cup::after { content: ""; position: absolute; width: 54px; height: 12px; border-radius: 50%; background: #5d3823; left: 9px; top: -4px; box-shadow: inset 0 2px 0 rgba(255,255,255,.2); }
    .steam { height: 24px; display: flex; justify-content: center; gap: 8px; margin-bottom: -3px; }
    .steam i { width: 3px; height: 22px; border-radius: 50%; background: rgba(255,255,255,.45); animation: steam 2.4s ease-in-out infinite; }
    .steam i:nth-child(2) { animation-delay: .55s; height: 18px; }
    @keyframes steam { 0%,100% { transform: translateY(6px) scaleX(1); opacity: .2; } 50% { transform: translateY(-4px) scaleX(2.6); opacity: .75; } }
    .slot {
      min-height: 154px;
      display: grid;
      place-content: center;
      padding: 10px 8px 16px;
    }
    .slot-label { font-size: 12px; color: var(--orange); font-weight: 700; letter-spacing: .08em; margin-bottom: 4px; }
    .slot-name { font-family: "Jua", sans-serif; font-size: 42px; line-height: 1.05; color: var(--coffee); min-height: 46px; }
    .slot-company { margin-top: 7px; color: var(--muted); font-size: 14px; line-height: 1.45; }
    .slot.spinning .slot-name { animation: blur .12s linear infinite; }
    @keyframes blur { 50% { opacity: .45; transform: translateY(2px) scale(.98); filter: blur(1px); } }
    .draw-btn {
      width: 100%;
      min-height: 58px;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--orange), #ff6d2d);
      color: white;
      font-family: "Jua", sans-serif;
      font-size: 21px;
      letter-spacing: .01em;
      box-shadow: 0 12px 26px rgba(255,110,45,.3), inset 0 1px 0 rgba(255,255,255,.35);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .draw-btn:active { transform: translateY(2px) scale(.99); box-shadow: 0 6px 14px rgba(255,110,45,.25); }
    .draw-btn:disabled { cursor: wait; opacity: .75; }
    .result {
      display: none;
      border-top: 1px dashed #dbcbbb;
      padding-top: 17px;
      margin-top: 17px;
      text-align: left;
    }
    .result.show { display: block; animation: rise .35s ease-out; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } }
    .result-meta { display: grid; gap: 7px; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .result-meta div { display: flex; gap: 8px; align-items: flex-start; }
    .result-meta span:first-child { flex: 0 0 19px; }
    .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
    .action {
      border: 1px solid #e6d8c6;
      background: var(--foam);
      color: var(--coffee);
      text-decoration: none;
      border-radius: 14px;
      min-height: 52px;
      display: grid;
      place-content: center;
      gap: 2px;
      text-align: center;
      font-size: 11px;
      cursor: pointer;
    }
    .action b { font-size: 18px; font-weight: 400; line-height: 1; }
    .action.share { background: #fee500; border-color: #f1d900; color: #3c1e1e; }
    .contacted-btn {
      width: 100%;
      border: 0;
      border-radius: 13px;
      margin-top: 9px;
      padding: 10px;
      color: #377c73;
      background: #e1f7f3;
      cursor: pointer;
      font-size: 13px;
    }
    .contacted-btn.done { color: #6d5b50; background: #eee5da; }
    .footer-card {
      color: rgba(255,255,255,.82);
      padding: 18px 4px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 13px;
    }
    .stats strong { color: white; }
    .history { margin-top: 14px; display: flex; gap: 7px; flex-wrap: wrap; }
    .history:empty { display: none; }
    .history-chip { border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); color: rgba(255,255,255,.78); border-radius: 99px; padding: 6px 9px; font-size: 11px; }
    .toast { position: fixed; left: 50%; bottom: max(24px, env(safe-area-inset-bottom)); transform: translate(-50%, 20px); padding: 11px 16px; background: #21150f; color: white; border-radius: 99px; font-size: 13px; opacity: 0; pointer-events: none; transition: .25s; z-index: 9; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,.25); }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 8; overflow: hidden; }
    .confetti i { position: absolute; top: -20px; width: 9px; height: 15px; border-radius: 2px; animation: fall 1.8s ease-in forwards; }
    @keyframes fall { to { transform: translate3d(var(--drift), 105vh, 0) rotate(720deg); opacity: .2; } }
    @media (max-width: 380px) {
      .controls { grid-template-columns: 1fr; }
      .toggle-row { grid-column: 1; }
      .actions { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 720px) {
      .app { padding-top: 42px; }
      .panel { border-radius: 32px; }
    }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; } }
  </style>

            <button class="action share" id="shareBtn"><b>↗</b><span>카톡 공유</span></button>
          </div>
          <button class="contacted-btn" id="contactedBtn">✓ 이번 달 연락 완료로 표시</button>
        </div>
      </div>
    </section>

    <div class="footer-card">
      <div class="stats">전체 <strong id="totalCount">0명</strong> · 이번 달 연락 <strong id="contactedCount">0명</strong></div>
      <div id="monthLabel"></div>
    </div>
    <div class="history" id="history" aria-label="최근 뽑은 동기"></div>
  </main>

    const SHARE_URL = "https://dctland-cloud.github.io/aSSIST2509/coffee/";

    const contactedKey = `coffee-contacted-${monthKey}`;

    const $ = id => document.getElementById(id);
    let current = null;
    let lastName = "";
    let historyNames = [];
    let contacted = new Set(JSON.parse(localStorage.getItem(contactedKey) || "[]"));

    function safeText(value) { return String(value || "").trim(); }
    function uniqueCompanies() {
      return [...new Set(contacts.map(c => safeText(c.company)).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ko"));
    }
    function randomIndex(max) {
      if (max <= 1) return 0;
      const values = new Uint32Array(1);
      crypto.getRandomValues(values);
      return values[0] % max;
    }
    function currentPool() {
      const me = $("meSelect").value;
      const company = $("companySelect").value;
      const freshOnly = $("freshOnly").checked;
      return contacts.filter(c =>
        c.name !== me &&
        (!company || c.company === company) &&
        (!freshOnly || !contacted.has(c.name))
      );
    }
    function populateControls() {
      const names = [...contacts].sort((a, b) => a.name.localeCompare(b.name, "ko"));
      $("meSelect").innerHTML = `<option value="">내 이름 선택 안 함</option>` + names.map(c => `<option value="${c.name}">${c.name}</option>`).join("");
      const savedMe = localStorage.getItem(meKey);
      $("meSelect").value = names.some(c => c.name === savedMe) ? savedMe : (names.some(c => c.name === "송동근") ? "송동근" : "");
      $("companySelect").innerHTML = `<option value="">전체 동기</option>` + uniqueCompanies().map(company => `<option value="${company}">${company}</option>`).join("");
      $("totalCount").textContent = `${contacts.length}명`;
      const [year, month] = monthKey.split("-");
      $("monthLabel").textContent = `${year}.${month}`;
      updateCounts();
    }
    function updateCounts() {
      const eligibleCount = $("eligibleCount");
      if (eligibleCount) eligibleCount.textContent = currentPool().length;
      $("contactedCount").textContent = `${contacted.size}명`;
    }
    function choose(pool) {
      let choices = pool;
      if (pool.length > 1) choices = pool.filter(c => c.name !== lastName);
      return choices[randomIndex(choices.length)];
    }
    function draw() {
      const pool = currentPool();
      if (!pool.length) {
        showToast("조건에 맞는 동기가 없어요. 필터를 바꿔보세요!");
        return;
      }
      $("drawBtn").disabled = true;
      $("result").classList.remove("show");
      $("slot").classList.add("spinning");
      $("slotLabel").textContent = "두근두근 뽑는 중";
      let ticks = 0;
      const timer = setInterval(() => {
        const preview = pool[randomIndex(pool.length)];
        $("slotName").textContent = preview.name;
        $("slotCompany").textContent = preview.company || "멋진 동기";
        ticks++;
        if (ticks >= 24) {
          clearInterval(timer);
          reveal(choose(pool));
        }
      }, 70 + ticks * 3);
    }
    function reveal(contact) {
      current = contact;
      lastName = contact.name;
      $("slot").classList.remove("spinning");
      $("slotLabel").textContent = "오늘의 커피 메이트";
      $("slotName").textContent = contact.name;
      $("slotCompany").textContent = contact.company || "aSSIST 동기";
      const role = [contact.title, contact.department].filter(Boolean).join(" · ");
      $("roleText").textContent = role || contact.company || "반가운 동기";
      $("roleRow").hidden = !role && !contact.company;
      $("addressText").textContent = contact.address || "주소 정보 없음";
      $("addressRow").hidden = !contact.address;
      $("callBtn").href = contact.phone ? `tel:${contact.phone.replace(/[^0-9+]/g, "")}` : "#";
      $("smsBtn").href = contact.phone ? `sms:${contact.phone.replace(/[^0-9+]/g, "")}?body=${encodeURIComponent(`${contact.name} 박사님, 오늘 커피 한잔 어떠세요? ☕`)}` : "#";
      $("mapBtn").href = `https://map.kakao.com/link/search/${encodeURIComponent(contact.address || contact.company || contact.name)}`;
      updateContactedButton();
      $("result").classList.add("show");
      $("drawBtn").textContent = "🔄 다른 동기 다시 뽑기";
      $("drawBtn").disabled = false;
      addHistory(contact.name);
      burstConfetti();
    }
    function updateContactedButton() {
      const done = current && contacted.has(current.name);
      $("contactedBtn").classList.toggle("done", done);
      $("contactedBtn").textContent = done ? "↩ 연락 완료 표시 취소" : "✓ 이번 달 연락 완료로 표시";
    }
    function toggleContacted() {
      if (!current) return;
      if (contacted.has(current.name)) contacted.delete(current.name);
      else contacted.add(current.name);
      localStorage.setItem(contactedKey, JSON.stringify([...contacted]));
      updateContactedButton();
      updateCounts();
      showToast(contacted.has(current.name) ? `${current.name} 박사님, 연락 완료!` : "연락 완료 표시를 취소했어요");
    }
    async function shareResult() {
      if (!current) return;
      const text = `☕ 오늘의 커피 메이트는 ${current.name} 박사님!\n${current.company || "aSSIST 동기"}\n우리도 오늘 커피 룰렛 돌려볼까요?`;
      if (navigator.share) {
        try { await navigator.share({ title: "오늘 누구랑 커피?", text, url: SHARE_URL }); }
        catch (error) { if (error.name !== "AbortError") copyShare(text); }
      } else copyShare(text);
    }
    async function copyShare(text) {
      await navigator.clipboard.writeText(`${text}\n${SHARE_URL}`);
      showToast("공유 문구와 주소를 복사했어요");
    }
    function addHistory(name) {
      historyNames = [name, ...historyNames.filter(n => n !== name)].slice(0, 5);

    }
    function showToast(message) {
      $("toast").textContent = message;
      $("toast").classList.add("show");

    }
    function burstConfetti() {
      const colors = ["#ff8a3d", "#69d4c7", "#fee500", "#ffffff", "#ff7a9a"];
      $("confetti").innerHTML = Array.from({ length: 36 }, (_, i) =>
        `<i style="left:${randomIndex(100)}%;background:${colors[i % colors.length]};--drift:${randomIndex(180)-90}px;animation-delay:${randomIndex(220)}ms"></i>`
      ).join("");
      setTimeout(() => $("confetti").innerHTML = "", 2300);
    }

    $("drawBtn").addEventListener("click", draw);
    $("contactedBtn").addEventListener("click", toggleContacted);
    $("shareBtn").addEventListener("click", shareResult);
    $("meSelect").addEventListener("change", () => { localStorage.setItem(meKey, $("meSelect").value); updateCounts(); });
    $("companySelect").addEventListener("change", updateCounts);
    $("freshOnly").addEventListener("change", updateCounts);
    populateControls();
  </script>
</body>
</html>
